[toolchain]
# Nightly is required for `custom_test_frameworks` (our QEMU test harness, see
# DECISIONS.md §7). This is the normal, well-trodden path for OS development in
# Rust, but it is a real dependency and we'd rather name it than hide it.
channel = "nightly"
components = ["rust-src", "llvm-tools", "rustfmt", "clippy"]
targets = ["aarch64-unknown-none-softfloat"]
