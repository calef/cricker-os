name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A quick follow-up push supersedes the in-flight run on the same ref, rather than queueing behind it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Each job's real work is a script from script/ (the "Scripts to Rule Them All" set), so CI runs
# exactly what a developer runs locally. See notes/scripts.md.
jobs:
  test:
    name: build + test (host + QEMU)
    runs-on: ubuntu-latest
    # A hung kernel means QEMU never exits and the runner would block until the 6-hour default.
    # Fail loudly instead. Local runs finish in well under a minute once built.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # script/cibuild bootstraps the toolchain and QEMU (the same script/bootstrap a developer
      # runs), then runs the host-logic crates and the kernel under QEMU (TCG), exiting through
      # semihosting.
      - run: script/cibuild

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustfmt (pinned nightly)
        run: rustup toolchain install nightly --profile minimal --component rustfmt
      - run: script/fmt

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clippy and the bare-metal target
        run: |
          rustup toolchain install nightly --profile minimal --component clippy
          rustup target add --toolchain nightly aarch64-unknown-none-softfloat
      - uses: Swatinem/rust-cache@v2
      - run: script/lint
