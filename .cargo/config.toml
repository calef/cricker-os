[alias]
xtask = "run --quiet --package xtask --"

# `cargo run -p kernel --target aarch64-unknown-none-softfloat` and
# `cargo test -p kernel --target aarch64-unknown-none-softfloat` both work because of
# this runner: cargo appends the built ELF path to the end of the command.
#
# It is a script rather than a bare qemu invocation because QEMU only follows the
# Linux arm64 boot protocol (and only hands us a device tree) for a flat `Image`, not
# for an ELF. The script strips the ELF to a flat binary first. See
# scripts/qemu-runner.sh and notes/boot-protocol.md.
[target.aarch64-unknown-none-softfloat]
runner = "scripts/qemu-runner.sh"
